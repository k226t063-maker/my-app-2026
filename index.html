<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Picross</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Web Picross</h1>
        
        <div class="controls">
            <div class="game-settings">
                <div class="setting-item">
                    <label for="select-difficulty">難易度:</label>
                    <select id="select-difficulty">
                        <option value="all">すべて</option>
                        <option value="easy">初級 (5x5)</option>
                        <option value="normal">中級 (10x10)</option>
                        <option value="hard">上級 (15x15)</option>
                        <option value="boss" id="opt-boss" disabled>？？？ (20x20)</option>
                    </select>
                    <button id="btn-random">開始 / 次の問題</button>
                    <button id="btn-open-shop" class="secondary-btn">🎨 デザインショップ</button>
                </div>
                
                <div class="progress-area">
                    <div class="coin-display">
                        <span class="coin-icon">💰</span> <span id="coin-count">0</span> コイン
                    </div>
                    <div class="progress-row" id="progress-boss-row" style="display: none;">
                        <span class="progress-label boss-text">魔王:</span>
                        <span class="progress-val"><span id="cleared-boss">0</span> / <span id="total-boss">0</span></span>
                    </div>
                    <div class="progress-row">
                        <span class="progress-label">初級:</span>
                        <span class="progress-val"><span id="cleared-easy">0</span> / <span id="total-easy">0</span></span>
                    </div>
                    <div class="progress-row">
                        <span class="progress-label">中級:</span>
                        <span class="progress-val"><span id="cleared-normal">0</span> / <span id="total-normal">0</span></span>
                    </div>
                    <div class="progress-row">
                        <span class="progress-label">上級:</span>
                        <span class="progress-val"><span id="cleared-hard">0</span> / <span id="total-hard">0</span></span>
                    </div>
                </div>
            </div>

            <div class="play-tools">
                <button id="btn-reset">最初から</button>
            </div>

            <div class="item-area">
                <span class="item-label">アイテム: </span>
                <button id="btn-straight-punch" class="item-btn">
                    🥊 ストレートパンチ (<span id="item-count">0</span>)
                </button>
                <p class="item-desc">※ランダムな一列の答えを埋めます</p>
            </div>
        </div>

        <div id="game-container">
            <div id="clues-top"></div>
            <div id="clues-left"></div>
            <div id="grid-board"></div>
        </div>

        <div id="message-area"></div>
    </div>

    <div id="victory-overlay" class="hidden">
        <div class="victory-content">
            <h2 class="victory-title">CONGRATULATIONS!</h2>
            <p class="victory-message">パズルをクリアしました！</p>
            <div class="victory-stats">
                <span id="finish-time"></span>
            </div>
            <button id="btn-next-puzzle">次のパズルへ</button>
        </div>
        <canvas id="confetti-canvas"></canvas>
    </div>

    <div id="shop-modal" class="modal hidden">
        <div class="modal-content">
            <h3>🎨 デザインショップ</h3>
            <p>獲得したコインで新しいデザインを解放しよう！</p>
            <div id="theme-list" class="theme-list">
                <!-- Themes will be generated here -->
            </div>
            <button id="btn-close-shop" class="close-btn">閉じる</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
