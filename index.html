<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Picross</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Web Picross</h1>
        
        <div class="controls">
            <div class="game-settings">
                <label for="select-puzzle">パズルを選択:</label>
                <select id="select-puzzle">
                    <optgroup label="初級 (5x5)">
                        <option value="easy-heart">ハート</option>
                        <option value="easy-duck">アヒル</option>
                        <option value="easy-note">音符</option>
                    </optgroup>
                    <optgroup label="中級 (10x10)">
                        <option value="normal-house">家</option>
                        <option value="normal-mushroom">キノコ</option>
                        <option value="normal-dog">イヌ</option>
                    </optgroup>
                    <optgroup label="上級 (15x15)">
                        <option value="hard-rocket">ロケット</option>
                        <option value="hard-tree">大きな木</option>
                    </optgroup>
                </select>
                <button id="btn-start">スタート</button>
            </div>

            <div class="play-tools">
                <button id="tool-fill" class="active">塗り (Click)</button>
                <button id="tool-x">× (Mark)</button>
                <button id="btn-reset">最初から</button>
            </div>
        </div>

        <div id="game-container">
            <div id="clues-top"></div>
            <div id="clues-left"></div>
            <div id="grid-board"></div>
        </div>

        <div id="message-area"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
